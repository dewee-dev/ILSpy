name: Build ILSpy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0.x

    - name: Configure NuGet sources
      run: |
        mkdir -p ~/.nuget/NuGet
        cat > ~/.nuget/NuGet/NuGet.Config <<EOF
        <configuration>
          <packageSources>
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            <add key="dotnet10-transport" value="https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet10-transport/nuget/v3/index.json" />
          </packageSources>
          <packageSourceMapping>
            <packageSource key="dotnet10-transport">
              <package pattern="dotnet-format" />
            </packageSource>
          </packageSourceMapping>
        </configuration>
        EOF

    - name: Install dotnet-format
      run: dotnet tool install -g dotnet-format --version "10.0.100-rtm.25531.102"

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal

    - name: Publish artifacts
      run: dotnet publish ./ILSpy/ILSpy.csproj --configuration Release --output ./artifacts

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ILSpy-artifacts
        path: ./artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/master'
      with:
        tag_name: v${{ github.run_number }}
        name: "ILSpy Build ${{ github.run_number }}"
        body: "Automated build of ILSpy from master branch."
        draft: false
        prerelease: false
        files: ./artifacts/**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
